<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>KPI Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=block" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --border: #1c1c1c; --muted: #2a2a2a;
    --text: #e8e8e8; --sub: #555; --amber: #F0A500; --green: #22C55E;
    --red: #EF4444; --blue: #4A9EFF; --yellow: #EAB308;
    --bb: 'Bebas Neue', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: monospace; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; height: 3px; } ::-webkit-scrollbar-thumb { background: var(--muted); }

  /* ── HEADER ── */
  #header { border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; flex-wrap: wrap; background: linear-gradient(90deg, #0a0a0a, #080808); }
  .h-left .sub-label { font-size: 9px; color: var(--sub); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 2px; }
  .h-left .title { font-family: var(--bb); font-size: 22px; letter-spacing: .06em; }
  .h-left .title span { color: var(--amber); text-shadow: 0 0 20px #F0A50060; }
  .h-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s ease infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .live-label { font-size: 9px; color: var(--green); text-transform: uppercase; letter-spacing: .15em; }
  .month-select { background: #0d0d0d; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text); cursor: pointer; outline: none; max-width: 160px; }
  .month-select:focus { border-color: var(--amber); }
  .refresh-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); transition: all .2s; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); box-shadow: 0 0 12px #F0A50030; }

  /* ── CONTENT ── */
  #content { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { text-align: center; padding: 80px 20px; font-family: var(--bb); font-size: 22px; letter-spacing: .1em; color: var(--sub); }

  /* ── SECTION ── */
  .section { margin-bottom: 28px; }
  .section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .section-bar { width: 2px; height: 14px; border-radius: 1px; flex-shrink: 0; }
  .section-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .14em; }

  /* ── TOTALS BAR ── */
  .totals-bar { background: linear-gradient(135deg, #0f0f0f, #0a0a0a); border: 1px solid #2a1f00; border-top: 2px solid var(--amber); border-radius: 8px; padding: 16px 20px; display: flex; gap: 24px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; box-shadow: 0 0 40px #F0A50010, inset 0 1px 0 #F0A50020; }
  .t-item .t-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .15em; margin-bottom: 4px; }
  .t-item .t-val { font-family: var(--bb); font-size: 30px; line-height: 1; }
  .glow-amber { text-shadow: 0 0 20px #F0A50070; }
  .glow-green  { text-shadow: 0 0 20px #22C55E70; }
  .glow-blue   { text-shadow: 0 0 20px #4A9EFF70; }
  .glow-red    { text-shadow: 0 0 20px #EF444470; }

  /* ── SUMMARY GRID ── */
  .grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }

  .sum-card { background: linear-gradient(135deg, #111, #0d0d0d); border: 1px solid var(--border); border-radius: 8px; padding: 14px; position: relative; overflow: hidden; transition: transform .2s, box-shadow .2s; }
  .sum-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, currentColor, transparent); opacity: .15; }
  .sum-card:hover { transform: translateY(-2px); }
  .sum-card .s-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
  .sum-card .s-val { font-family: var(--bb); font-size: 26px; line-height: 1; }

  /* ── REP CARD ── */
  .rep-card { background: linear-gradient(160deg, #111 0%, #0c0c0c 100%); border: 1px solid var(--border); border-radius: 8px; padding: 18px; position: relative; overflow: hidden; transition: box-shadow .3s; }
  .rep-card::after { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background: radial-gradient(ellipse at top left, currentColor 0%, transparent 60%); opacity:.03; pointer-events:none; }
  .rep-card:hover { box-shadow: 0 4px 30px currentColor; }
  .rep-title { font-family: var(--bb); font-size: 18px; letter-spacing: .06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .rep-badge { font-size: 8px; padding: 2px 7px; border-radius: 20px; border: 1px solid currentColor; opacity: .6; font-family: monospace; text-transform: uppercase; letter-spacing: .1em; }
  .m-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #141414; }
  .m-row:last-child { border-bottom: none; }
  .m-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; }
  .m-val { font-family: var(--bb); font-size: 18px; }

  /* ── RATES CARD ── */
  .rates-card { background: linear-gradient(160deg, #111 0%, #0c0c0c 100%); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
  .rates-title { font-family: var(--bb); font-size: 15px; letter-spacing: .06em; margin-bottom: 14px; }
  .r-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #141414; }
  .r-row:last-child { border-bottom: none; }
  .r-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; }
  .r-val { font-family: var(--bb); font-size: 15px; }

  /* ── PROGRESS RING ── */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ring-container { position: relative; width: 80px; height: 80px; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
  .ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }
  .ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: var(--bb); font-size: 16px; line-height: 1; text-align: center; }
  .ring-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .1em; text-align: center; }
  .rings-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; padding: 10px 0; }

  /* ── COUNTER ANIMATION ── */
  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation: fadeSlideUp .5s ease forwards; }

  /* ── KPI COLORS ── */
  .c-amber  { color: var(--amber); }
  .c-green  { color: var(--green); }
  .c-red    { color: var(--red); }
  .c-blue   { color: var(--blue); }
  .c-yellow { color: var(--yellow); }
  .c-sub    { color: var(--sub); }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    #header { padding: 10px 14px; }
    #content { padding: 12px 14px; }
    .grid-5 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .totals-bar { gap: 16px; padding: 12px 14px; }
    .t-item .t-val { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="h-left">
    <div class="sub-label">Sales Mastery</div>
    <div class="title">KPI <span>DASHBOARD</span></div>
  </div>
  <div class="h-right">
    <div class="live-dot"></div>
    <span class="live-label">Live</span>
    <select class="month-select" id="month-select"></select>
    <button class="refresh-btn" id="refresh-btn">↺ Refresh</button>
  </div>
</div>

<div id="content">
  <div class="msg">LOADING DATA...</div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPB9aR6i6DcmJVb1TYr2AXG1BVvKLgiHj2wjrBO4oVnQRuhPufZ-ulVUNJbYXJaL04/exec';

// ── Formatters ────────────────────────────────────────────────────────────────
function fmt(n)  { return (!n && n!==0)||!isFinite(n)?'—':Math.round(+n).toLocaleString(); }
function fmtD(n) { return (!n && n!==0)?'—':'$'+Math.round(+n).toLocaleString(); }
function pct(n)  { var v=parseFloat(n); return isNaN(v)||v===0?'—':(v*100).toFixed(1)+'%'; }
function roi(n)  { return (!n||n==='-'||n==='')?'—':n; }
function kpiColor(val,low,mid) { var v=parseFloat(val); if(isNaN(v)||v===0)return'c-sub'; if(v>=mid)return'c-green'; if(v>=low)return'c-yellow'; return'c-red'; }

// ── Counter animation ─────────────────────────────────────────────────────────
function animateCounter(el, target, prefix, suffix, duration) {
  if (!target || isNaN(target)) return;
  var start = 0, startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    var progress = Math.min((ts - startTime) / duration, 1);
    var ease = 1 - Math.pow(1 - progress, 3);
    var val = Math.round(start + (target - start) * ease);
    el.textContent = prefix + val.toLocaleString() + suffix;
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = prefix + target.toLocaleString() + suffix;
  }
  requestAnimationFrame(step);
}

// ── Progress ring ─────────────────────────────────────────────────────────────
function ring(label, value, color, size) {
  size = size || 80;
  var r = (size/2) - 6;
  var circ = 2 * Math.PI * r;
  var pctVal = parseFloat(value);
  var filled = isNaN(pctVal) ? 0 : Math.min(Math.max(pctVal, 0), 1);
  var id = 'ring_' + Math.random().toString(36).substr(2,6);
  setTimeout(function() {
    var el = document.getElementById(id);
    if (el) el.style.strokeDashoffset = circ * (1 - filled);
  }, 100);
  return '<div class="ring-wrap">'
    + '<div class="ring-container" style="width:'+size+'px;height:'+size+'px">'
    + '<svg class="ring-svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    + '<circle class="ring-bg" cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'"/>'
    + '<circle id="'+id+'" class="ring-fill" cx="'+(size/2)+'" cy="'+(size/2)+'" r="'+r+'"'
    + ' stroke="'+color+'" filter="drop-shadow(0 0 4px '+color+')"'
    + ' stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'"/>'
    + '</svg>'
    + '<div class="ring-text" style="color:'+color+'">'+(isNaN(pctVal)?'—':(pctVal*100).toFixed(0)+'%')+'</div>'
    + '</div>'
    + '<div class="ring-label">'+label+'</div>'
    + '</div>';
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
function fetchData(url, cb) {
  fetch(url, { redirect: 'follow', mode: 'no-cors' })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      try { cb(null, JSON.parse(text)); }
      catch(e) {
        // no-cors won't work for reading — fall back to XHR with redirect follow
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
          if (xhr.readyState === 4) {
            try { cb(null, JSON.parse(xhr.responseText)); }
            catch(e2) { cb('PARSE ERROR: ' + xhr.responseText.substring(0,200)); }
          }
        };
        xhr.onerror = function() { cb('NETWORK ERROR'); };
        xhr.send();
      }
    })
    .catch(function() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          try { cb(null, JSON.parse(xhr.responseText)); }
          catch(e) { cb('PARSE ERROR: ' + xhr.responseText.substring(0,200)); }
        }
      };
      xhr.onerror = function() { cb('NETWORK ERROR'); };
      xhr.send();
    });
}

function initSheets() {
  var sel = document.getElementById('month-select');
  sel.innerHTML = '<option>Loading...</option>';
  fetchData(SCRIPT_URL + '?action=sheets&t=' + Date.now(), function(err, sheets) {
    if (err || !Array.isArray(sheets)) { sel.innerHTML = '<option value="">Default</option>'; loadData(); return; }
    sel.innerHTML = sheets.map(function(s,i) {
      return '<option value="'+s+'"'+(i===0?' selected':'')+'>'+s+'</option>';
    }).join('');
    loadData();
  });
}

function loadData() {
  document.getElementById('content').innerHTML = '<div class="msg">LOADING DATA...</div>';
  var sel = document.getElementById('month-select');
  var sheet = sel ? sel.value : '';
  var url = SCRIPT_URL + '?t=' + Date.now() + (sheet ? '&sheet=' + encodeURIComponent(sheet) : '');
  fetchData(url, function(err, d) {
    if (err) {
      document.getElementById('content').innerHTML = '<div class="msg" style="color:var(--red);font-size:12px">'+err+'</div>';
      return;
    }
    render(d);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(d) {
  var s  = d.summary || {};
  var t  = d.totals  || {};
  var ad = d.adKpis  || {};
  var setters = d.setters || [];
  var closers = d.closers || [];
  var html = '';

  // ── TOTALS BAR ──
  html += '<div class="totals-bar animate-in">';
  html += tItem('Total Revenue', +t.revenue||0, '$', '', 'glow-amber c-amber');
  html += tItem('Total Cash',    +t.cash||0,    '$', '', 'glow-green c-green');
  html += tItem('Total Closes',  +t.closes||0,  '',  '', 'glow-blue c-blue');
  html += '<div class="t-item" style="margin-left:auto"><div class="t-label">Cash ROI</div><div class="t-val c-sub">'+roi(s.cashROI)+'</div></div>';
  html += tItem('Rev ROI', null, '', roi(s.revROI), 'c-sub', true);
  html += '</div>';

  // ── MTD SUMMARY ──
  html += section('var(--amber)', 'Month-to-Date Summary',
    '<div class="grid-5">'
    + sCard('New Leads',    +s.newLeads||0,    '$','','c-blue',  true, false)
    + sCard('Dials',        +s.reachOuts||0,   '$','','c-blue',  true, false)
    + sCard('Calls Booked', +s.callsBooked||0, '$','','c-amber', true, false)
    + sCard('Calls Taken',  +s.callsTaken||0,  '$','','c-green', true, false)
    + sCard('Show Up Rate', parseFloat(s.showUpRate)||0, '$','%', kpiColor(s.showUpRate,.6,.75), true, true)
    + sCard('New Clients',  +s.newClients||0,  '$','','c-green', true, false)
    + sCard('Total Cash',   +s.totalCash||0,   '$','','c-amber', true, true, true)
    + sCard('Total Revenue',+s.totalRevenue||0,'$','','c-amber', true, true, true)
    + sCard('Ad Spend',     +s.adSpend||0,     '$','','c-red',   true, true, true)
    + sCard('Cash ROI',     null,'','','c-green',false,false,false, roi(s.cashROI))
    + sCard('Revenue ROI',  null,'','','c-green',false,false,false, roi(s.revROI))
    + sCard('Hours Worked', +s.hoursWorked||0, '','h','c-sub',  true, false)
    + '</div>'
  );

  // ── REP PERFORMANCE ──
  var repCards = '';
  setters.forEach(function(rep) {
    repCards += repCard(rep, 'var(--blue)', '#4A9EFF', 'Setter', [
      { l:'Dials',        v:+rep.dials||0,     p:'',  s:'',  c:'c-blue'  },
      { l:'Pick Ups',     v:+rep.pickups||0,   p:'',  s:'',  c:'c-blue'  },
      { l:'Proposed',     v:+rep.proposed||0,  p:'',  s:'',  c:'c-sub'   },
      { l:'Follow Ups',   v:+rep.followups||0, p:'',  s:'',  c:'c-sub'   },
      { l:'Calls Booked', v:+rep.booked||0,    p:'',  s:'',  c:'c-amber' },
    ]);
  });
  closers.forEach(function(rep) {
    repCards += repCard(rep, 'var(--green)', '#22C55E', 'Closer', [
      { l:'Calls Taken',     v:+rep.taken||0,    p:'',  s:'',  c:'c-green' },
      { l:'Offers Proposed', v:+rep.offers||0,   p:'',  s:'',  c:'c-green' },
      { l:'No Shows',        v:+rep.noshows||0,  p:'',  s:'',  c:'c-red'   },
      { l:'Follow Ups',      v:+rep.followups||0,p:'',  s:'',  c:'c-sub'   },
      { l:'Closes',          v:+rep.closes||0,   p:'',  s:'',  c:'c-amber' },
      { l:'Cash Collected',  v:+rep.cash||0,     p:'$', s:'',  c:'c-amber', money:true },
      { l:'Revenue',         v:+rep.revenue||0,  p:'$', s:'',  c:'c-amber', money:true },
    ]);
  });
  if (repCards) html += section('var(--blue)', 'Rep Performance — MTD Totals', '<div class="grid-3">'+repCards+'</div>');

  // ── RATE RINGS ──
  var ringsHtml = '';
  setters.forEach(function(rep) {
    var r = rep.rates || {};
    var n = rep.name || 'Setter';
    ringsHtml += '<div style="background:linear-gradient(160deg,#111,#0c0c0c);border:1px solid var(--border);border-radius:8px;padding:18px">'
      + '<div class="rates-title" style="color:var(--blue);margin-bottom:14px">'+n.toUpperCase()+' RATES</div>'
      + '<div class="rings-grid">'
      + ring('Dial → Response', parseFloat(r.dialToResponse)||0, '#4A9EFF')
      + ring('Booked → Show',   parseFloat(r.bookedToShow)||0,   '#F0A500')
      + ring('Convo → Triage',  parseFloat(r.convoToTriage)||0,  '#4A9EFF')
      + ring('Triage → SS',     parseFloat(r.triageShowToSS)||0, '#7AB8FF')
      + '</div></div>';
  });
  closers.forEach(function(rep) {
    var r = rep.rates || {};
    var n = rep.name || 'Closer';
    ringsHtml += '<div style="background:linear-gradient(160deg,#111,#0c0c0c);border:1px solid var(--border);border-radius:8px;padding:18px">'
      + '<div class="rates-title" style="color:var(--green);margin-bottom:14px">'+n.toUpperCase()+' RATES</div>'
      + '<div class="rings-grid">'
      + ring('Show Up %',    parseFloat(r.showUpPct)||0,     '#22C55E')
      + ring('Offer %',      parseFloat(r.offerProposed)||0, '#22C55E')
      + ring('Close Rate',   parseFloat(r.closeRate)||0,     '#F0A500')
      + ring('Lead → Close', parseFloat(r.leadToClose)||0,   '#F0A500')
      + '</div></div>';
  });
  if (ringsHtml) html += section('var(--green)', 'Conversion Rates', '<div class="grid-2">'+ringsHtml+'</div>');

  // ── AD KPIs ──
  html += section('var(--amber)', 'Ad KPIs',
    '<div class="grid-2">'
    + ratesCard('COST PER STAGE', 'var(--amber)', [
        { l:'Cost per GM',          v:fmtD(ad.costPerGM),         c:'c-blue' },
        { l:'Cost per Triage Show', v:fmtD(ad.costPerTriageShow), c:'c-blue' },
        { l:'Cost per SS Show',     v:fmtD(ad.costPerSSShow),     c:'c-blue' },
        { l:'Cost per Offer',       v:fmtD(ad.costPerOffer),      c:'c-blue' },
        { l:'Cost per Close',       v:fmtD(ad.costPerClose),      c:'c-blue' },
        { l:'Cash ROI',             v:roi(ad.cashROI),            c:'c-green'},
        { l:'Revenue ROI',          v:roi(ad.revenueROI),         c:'c-green'},
      ])
    + ratesCard('CONVERSION RATES', 'var(--amber)', [
        { l:"Leads to R.O's %",   v:pct(ad.leadsToROs),     c:'c-blue'                             },
        { l:'Convo to Triage %',  v:pct(ad.convoToTriage),  c:kpiColor(ad.convoToTriage,.3,.5)    },
        { l:'Triage → SS %',      v:pct(ad.triageShowToSS), c:kpiColor(ad.triageShowToSS,.5,.7)   },
        { l:'Offer Proposed %',   v:pct(ad.offerProposed),  c:kpiColor(ad.offerProposed,.5,.7)    },
        { l:'Close Rate',         v:pct(ad.closeRate),      c:kpiColor(ad.closeRate,.2,.35)       },
      ])
    + '</div>'
  );

  document.getElementById('content').innerHTML = html;

  // ── Trigger counter animations ──
  document.querySelectorAll('[data-count]').forEach(function(el) {
    var target = +el.getAttribute('data-count');
    var prefix = el.getAttribute('data-prefix') || '';
    var suffix = el.getAttribute('data-suffix') || '';
    animateCounter(el, target, prefix, suffix, 1200);
  });
}

// ── HTML helpers ──────────────────────────────────────────────────────────────
function tItem(label, val, prefix, suffix, cls, isStatic) {
  var inner = isStatic
    ? '<div class="t-val '+cls+'">'+suffix+'</div>'
    : '<div class="t-val '+cls+'" data-count="'+val+'" data-prefix="'+prefix+'" data-suffix="'+(suffix||'')+'">'+prefix+(val||0).toLocaleString()+(suffix||'')+'</div>';
  return '<div class="t-item"><div class="t-label">'+label+'</div>'+inner+'</div>';
}

function sCard(label, val, prefix, suffix, cls, animate, isMoney, isDollar, staticVal) {
  var display;
  if (staticVal !== undefined) {
    display = '<div class="s-val '+cls+'">'+staticVal+'</div>';
  } else if (isMoney || isDollar) {
    display = '<div class="s-val '+cls+'" data-count="'+val+'" data-prefix="$" data-suffix="">$'+(val||0).toLocaleString()+'</div>';
  } else if (suffix === '%') {
    var pctDisplay = isNaN(val) ? '—' : (val*100).toFixed(1)+'%';
    display = '<div class="s-val '+cls+'">'+pctDisplay+'</div>';
  } else {
    display = animate
      ? '<div class="s-val '+cls+'" data-count="'+val+'" data-prefix="'+prefix+'" data-suffix="'+suffix+'">'+(prefix||'')+(val||0).toLocaleString()+(suffix||'')+'</div>'
      : '<div class="s-val '+cls+'">'+(val||'—')+'</div>';
  }
  return '<div class="sum-card"><div class="s-label">'+label+'</div>'+display+'</div>';
}

function repCard(rep, color, hexColor, role, rows) {
  var rowsHtml = rows.map(function(r) {
    var valHtml = r.money
      ? '<span class="m-val '+r.c+'" data-count="'+r.v+'" data-prefix="$" data-suffix="">$'+(r.v||0).toLocaleString()+'</span>'
      : '<span class="m-val '+r.c+'" data-count="'+r.v+'" data-prefix="'+r.p+'" data-suffix="'+r.s+'">'+(r.p||'')+(r.v||0).toLocaleString()+(r.s||'')+'</span>';
    return '<div class="m-row"><span class="m-label">'+r.l+'</span>'+valHtml+'</div>';
  }).join('');
  return '<div class="rep-card" style="border-top:3px solid '+color+';color:'+hexColor+'">'
    + '<div class="rep-title" style="color:'+color+'">'+(rep.name||role).toUpperCase()
    + '<span class="rep-badge" style="color:'+color+'">'+role+'</span></div>'
    + rowsHtml + '</div>';
}

function ratesCard(title, color, rows) {
  return '<div class="rates-card"><div class="rates-title" style="color:'+color+'">'+title+'</div>'
    + rows.map(function(r) {
        return '<div class="r-row"><span class="r-label">'+r.l+'</span><span class="r-val '+r.c+'">'+r.v+'</span></div>';
      }).join('')
    + '</div>';
}

function section(color, label, inner) {
  return '<div class="section"><div class="section-hdr">'
    + '<div class="section-bar" style="background:'+color+'"></div>'
    + '<span class="section-label">'+label+'</span></div>'+inner+'</div>';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('month-select').addEventListener('change', loadData);
initSheets();
</script>
