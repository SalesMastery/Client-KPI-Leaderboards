<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>KPI Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=block" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #0f0f0f; --border: #1c1c1c; --muted: #2a2a2a;
    --text: #e8e8e8; --sub: #555; --amber: #F0A500; --green: #22C55E;
    --red: #EF4444; --blue: #4A9EFF; --yellow: #EAB308;
    --bb: 'Bebas Neue', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: monospace; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 3px; height: 3px; } ::-webkit-scrollbar-thumb { background: var(--muted); }

  /* HEADER */
  #header { border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; flex-wrap: wrap; }
  .h-left .sub-label { font-size: 9px; color: var(--sub); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 2px; }
  .h-left .title { font-family: var(--bb); font-size: 20px; letter-spacing: .04em; }
  .h-left .title span { color: var(--amber); }
  .h-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .month-select { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text); cursor: pointer; outline: none; max-width: 160px; }
  .month-select:focus { border-color: var(--amber); }
  .refresh-btn { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 6px 12px; cursor: pointer; font-family: monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--sub); transition: all .15s; white-space: nowrap; }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }

  /* CONTENT */
  #content { flex: 1; overflow-y: auto; padding: 16px 20px; }

  /* LOADING / ERROR */
  .msg { text-align: center; padding: 80px 20px; font-family: var(--bb); font-size: 22px; letter-spacing: .1em; color: var(--sub); }

  /* SECTION */
  .section { margin-bottom: 24px; }
  .section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .section-bar { width: 2px; height: 14px; border-radius: 1px; flex-shrink: 0; }
  .section-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .14em; }

  /* TOTALS BAR */
  .totals-bar { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--amber); border-radius: 6px; padding: 14px 18px; display: flex; gap: 24px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .t-item .t-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .15em; margin-bottom: 4px; }
  .t-item .t-val   { font-family: var(--bb); font-size: 28px; line-height: 1; }

  /* GRID */
  .grid-5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }

  /* SUMMARY CARD */
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px; }
  .sum-card .s-label { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 6px; }
  .sum-card .s-val   { font-family: var(--bb); font-size: 26px; line-height: 1; }

  /* REP CARD */
  .rep-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .rep-title { font-family: var(--bb); font-size: 16px; letter-spacing: .04em; margin-bottom: 12px; }
  .m-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .m-row:last-child { border-bottom: none; }
  .m-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; }
  .m-val   { font-family: var(--bb); font-size: 17px; }

  /* RATES CARD */
  .rates-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .rates-title { font-family: var(--bb); font-size: 15px; letter-spacing: .04em; margin-bottom: 12px; }
  .r-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .r-row:last-child { border-bottom: none; }
  .r-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; }
  .r-val   { font-family: var(--bb); font-size: 15px; }

  /* KPI COLORS */
  .c-amber  { color: var(--amber); }
  .c-green  { color: var(--green); }
  .c-red    { color: var(--red); }
  .c-blue   { color: var(--blue); }
  .c-yellow { color: var(--yellow); }
  .c-sub    { color: var(--sub); }

  /* MOBILE */
  @media (max-width: 768px) {
    #header { padding: 10px 14px; }
    #content { padding: 12px 14px; }
    .grid-5 { grid-template-columns: repeat(2,1fr); }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .totals-bar { gap: 16px; padding: 12px 14px; }
    .t-item .t-val { font-size: 22px; }
    .sum-card .s-val { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="header">
  <div class="h-left">
    <div class="sub-label">Sales Mastery</div>
    <div class="title">KPI <span>DASHBOARD</span></div>
  </div>
  <div class="h-right">
    <select class="month-select" id="month-select"></select>
    <button class="refresh-btn" id="refresh-btn">↺ Refresh</button>
  </div>
</div>

<div id="content">
  <div class="msg">LOADING DATA...</div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyra9iF_IX8YIqIJlyZbNd6Z9xu1i3mIsF5ACNBQ-fyV3WIfwsP20-1DsysRBXP38RYpg/exec';

// ── Formatters ────────────────────────────────────────────────────────────────
function fmt(n)  { return (!n && n !== 0) || !isFinite(n) ? '—' : Math.round(+n).toLocaleString(); }
function fmtD(n) { return (!n && n !== 0) ? '—' : '$' + Math.round(+n).toLocaleString(); }
function pct(n)  { var v = parseFloat(n); return isNaN(v) || v === 0 ? '—' : (v * 100).toFixed(1) + '%'; }
function roi(n)  { return (!n || n === '-' || n === '') ? '—' : n; }

function kpiColor(val, low, mid) {
  var v = parseFloat(val);
  if (isNaN(v) || v === 0) return 'c-sub';
  if (v >= mid) return 'c-green';
  if (v >= low) return 'c-yellow';
  return 'c-red';
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
function fetchData(url, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200 || xhr.status === 0) {
        try {
          var data = JSON.parse(xhr.responseText);
          cb(null, data);
        } catch(e) {
          cb('PARSE ERROR: ' + xhr.responseText.substring(0, 200));
        }
      } else {
        cb('HTTP ERROR: ' + xhr.status);
      }
    }
  };
  xhr.onerror = function() { cb('NETWORK ERROR'); };
  xhr.send();
}

// ── Init — load sheet list ────────────────────────────────────────────────────
function initSheets() {
  var sel = document.getElementById('month-select');
  sel.innerHTML = '<option>Loading...</option>';
  var url = SCRIPT_URL + '?action=sheets&t=' + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      try {
        var sheets = JSON.parse(xhr.responseText);
        if (Array.isArray(sheets) && sheets.length > 0) {
          sel.innerHTML = sheets.map(function(s, i) {
            return '<option value="' + s + '"' + (i === 0 ? ' selected' : '') + '>' + s + '</option>';
          }).join('');
        } else {
          sel.innerHTML = '<option value="">Default</option>';
        }
      } catch(e) {
        sel.innerHTML = '<option value="">Default</option>';
      }
      loadData();
    }
  };
  xhr.onerror = function() {
    sel.innerHTML = '<option value="">Default</option>';
    loadData();
  };
  xhr.send();
}

// ── Load data for selected sheet ──────────────────────────────────────────────
function loadData() {
  document.getElementById('content').innerHTML = '<div class="msg">LOADING DATA...</div>';
  var sel   = document.getElementById('month-select');
  var sheet = sel ? sel.value : '';
  var url   = SCRIPT_URL + '?t=' + Date.now() + (sheet ? '&sheet=' + encodeURIComponent(sheet) : '');
  var xhr   = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      try {
        var d = JSON.parse(xhr.responseText);
        render(d);
      } catch(e) {
        document.getElementById('content').innerHTML =
          '<div class="msg" style="color:var(--red);font-size:12px">' + xhr.responseText.substring(0, 300) + '</div>';
      }
    }
  };
  xhr.onerror = function() {
    document.getElementById('content').innerHTML =
      '<div class="msg" style="color:var(--red)">NETWORK ERROR</div>';
  };
  xhr.send();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(d) {
  var s = d.summary || {};
  var t = d.totals  || {};
  var ad = d.adKpis || {};
  var setters = d.setters || [];
  var closers = d.closers || [];

  var html = '';

  // TOTALS BAR
  html += '<div class="totals-bar">'
    + tItem('Total Revenue', fmtD(t.revenue), 'c-amber')
    + tItem('Total Cash',    fmtD(t.cash),    'c-green')
    + tItem('Total Closes',  fmt(t.closes),   'c-blue')
    + '<div class="t-item" style="margin-left:auto">' + tItemInner('Cash ROI', roi(s.cashROI), 'c-sub') + '</div>'
    + tItem('Rev ROI', roi(s.revROI), 'c-sub')
    + '</div>';

  // MTD SUMMARY
  html += section('var(--amber)', 'Month-to-Date Summary',
    '<div class="grid-5">'
    + sumCard('New Leads',     fmt(s.newLeads),             'c-blue')
    + sumCard('Reach Outs',    fmt(s.reachOuts),            'c-blue')
    + sumCard('Calls Booked',  fmt(s.callsBooked),          'c-amber')
    + sumCard('Calls Taken',   fmt(s.callsTaken),           'c-green')
    + sumCard('Show Up Rate',  pct(s.showUpRate),           kpiColor(s.showUpRate, 0.6, 0.75))
    + sumCard('New Clients',   fmt(s.newClients),           'c-green')
    + sumCard('Total Cash',    fmtD(s.totalCash),           'c-amber')
    + sumCard('Total Revenue', fmtD(s.totalRevenue),        'c-amber')
    + sumCard('Total Ad Spend',fmtD(s.adSpend),             'c-red')
    + sumCard('Cash ROI',      roi(s.cashROI),              'c-green')
    + sumCard('Revenue ROI',   roi(s.revROI),               'c-green')
    + sumCard('Hours Worked',  fmt(s.hoursWorked) + 'h',    'c-sub')
    + '</div>'
  );

  // REP PERFORMANCE
  var repCards = '';
  setters.forEach(function(s) {
    repCards += repCard(s.name || 'Setter', 'var(--blue)', [
      { l:'Dials',        v:fmt(s.dials),     c:'c-blue'  },
      { l:'Pick Ups',     v:fmt(s.pickups),   c:'c-blue'  },
      { l:'Proposed',     v:fmt(s.proposed),  c:'c-sub'   },
      { l:'Follow Ups',   v:fmt(s.followups), c:'c-blue'  },
      { l:'Calls Booked', v:fmt(s.booked),    c:'c-amber' },
    ]);
  });
  closers.forEach(function(c) {
    repCards += repCard(c.name || 'Closer', 'var(--green)', [
      { l:'Calls Taken',    v:fmt(c.taken),     c:'c-green' },
      { l:'Offers Proposed',v:fmt(c.offers),    c:'c-green' },
      { l:'No Shows',       v:fmt(c.noshows),   c:'c-red'   },
      { l:'Follow Ups',     v:fmt(c.followups), c:'c-sub'   },
      { l:'Closes',         v:fmt(c.closes),    c:'c-amber' },
      { l:'Cash Collected', v:fmtD(c.cash),     c:'c-amber' },
      { l:'Revenue',        v:fmtD(c.revenue),  c:'c-amber' },
    ]);
  });
  html += section('var(--blue)', 'Rep Performance — MTD Totals',
    '<div class="grid-3">' + repCards + '</div>'
  );

  // CONVERSION RATES
  var rateCards = '';
  setters.forEach(function(s) {
    var r = s.rates || {};
    rateCards += ratesCard(((s.name||'Setter') + ' Rates').toUpperCase(), 'var(--blue)', [
      { l:'Dial to Response',  v:pct(r.dialToResponse),  c:kpiColor(r.dialToResponse,0.1,0.2)  },
      { l:"Leads to R.O's",    v:pct(r.leadsToROs),      c:'c-blue'                            },
      { l:'Convo to Triage',   v:pct(r.convoToTriage),   c:kpiColor(r.convoToTriage,0.3,0.5)   },
      { l:'Booked to Show',    v:pct(r.bookedToShow),    c:kpiColor(r.bookedToShow,0.6,0.75)   },
      { l:'Triage Show to SS', v:pct(r.triageShowToSS),  c:'c-blue'                            },
    ]);
  });
  closers.forEach(function(c) {
    var r = c.rates || {};
    rateCards += ratesCard(((c.name||'Closer') + ' Rates').toUpperCase(), 'var(--green)', [
      { l:'Show Up %',       v:pct(r.showUpPct),     c:kpiColor(r.showUpPct,0.6,0.75)    },
      { l:'Offer Proposed %',v:pct(r.offerProposed), c:kpiColor(r.offerProposed,0.5,0.7) },
      { l:'Close Rate',      v:pct(r.closeRate),     c:kpiColor(r.closeRate,0.2,0.35)    },
      { l:'Lead to Close %', v:pct(r.leadToClose),   c:'c-amber'                         },
    ]);
  });
  html += section('var(--green)', 'Conversion Rates',
    '<div class="grid-2">' + rateCards + '</div>'
  );

  // AD KPIs
  html += section('var(--amber)', 'Ad KPIs',
    '<div class="grid-2">'
    + ratesCard('COST PER STAGE', 'var(--amber)', [
        { l:'Cost per GM',           v:fmtD(ad.costPerGM),         c:'c-blue' },
        { l:'Cost per Triage Show',  v:fmtD(ad.costPerTriageShow), c:'c-blue' },
        { l:'Cost per SS Show',      v:fmtD(ad.costPerSSShow),     c:'c-blue' },
        { l:'Cost per Offer',        v:fmtD(ad.costPerOffer),      c:'c-blue' },
        { l:'Cost per Close',        v:fmtD(ad.costPerClose),      c:'c-blue' },
        { l:'Cash ROI',              v:roi(ad.cashROI),            c:'c-green'},
        { l:'Revenue ROI',           v:roi(ad.revenueROI),         c:'c-green'},
      ])
    + ratesCard('CONVERSION RATES', 'var(--amber)', [
        { l:"Leads to R.O's %",    v:pct(ad.leadsToROs),      c:'c-blue'                              },
        { l:'Convo to Triage %',   v:pct(ad.convoToTriage),   c:kpiColor(ad.convoToTriage,0.3,0.5)   },
        { l:'Triage Show to SS %', v:pct(ad.triageShowToSS),  c:kpiColor(ad.triageShowToSS,0.5,0.7)  },
        { l:'Offer Proposed %',    v:pct(ad.offerProposed),   c:kpiColor(ad.offerProposed,0.5,0.7)   },
        { l:'Close Rate',          v:pct(ad.closeRate),       c:kpiColor(ad.closeRate,0.2,0.35)      },
      ])
    + '</div>'
  );

  document.getElementById('content').innerHTML = html;
}

// ── HTML helpers ──────────────────────────────────────────────────────────────
function tItem(label, val, cls) {
  return '<div class="t-item"><div class="t-label">' + label + '</div><div class="t-val ' + cls + '">' + val + '</div></div>';
}
function tItemInner(label, val, cls) {
  return '<div class="t-label">' + label + '</div><div class="t-val ' + cls + '">' + val + '</div>';
}
function section(color, label, inner) {
  return '<div class="section"><div class="section-hdr"><div class="section-bar" style="background:' + color + '"></div><span class="section-label">' + label + '</span></div>' + inner + '</div>';
}
function sumCard(label, val, cls) {
  return '<div class="sum-card"><div class="s-label">' + label + '</div><div class="s-val ' + cls + '">' + val + '</div></div>';
}
function repCard(name, color, rows) {
  var rowsHtml = rows.map(function(r) {
    return '<div class="m-row"><span class="m-label">' + r.l + '</span><span class="m-val ' + r.c + '">' + r.v + '</span></div>';
  }).join('');
  return '<div class="rep-card" style="border-top:3px solid ' + color + '"><div class="rep-title" style="color:' + color + '">' + name.toUpperCase() + '</div><div>' + rowsHtml + '</div></div>';
}
function ratesCard(title, color, rows) {
  var rowsHtml = rows.map(function(r) {
    return '<div class="r-row"><span class="r-label">' + r.l + '</span><span class="r-val ' + r.c + '">' + r.v + '</span></div>';
  }).join('');
  return '<div class="rates-card"><div class="rates-title" style="color:' + color + '">' + title + '</div>' + rowsHtml + '</div>';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', loadData);
document.getElementById('month-select').addEventListener('change', loadData);
initSheets();
</script>
</body>
</html>
